<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitAura AI | Desktop Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }
      .safe-area-pb {
        padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px));
      }

      /* Splash screen */
      .splash-logo-enter {
        opacity: 0;
        transform: scale(0.85);
      }
      .splash-logo-enter {
        animation: splashLogoEnter 0.8s ease-out forwards;
      }
      .splash-logo-exit {
        opacity: 0;
        transform: scale(1.05);
        transition: opacity 0.35s ease-out, transform 0.35s ease-out;
      }
      @keyframes splashLogoEnter {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .splash-text-enter {
        opacity: 0;
        transform: translateY(12px);
      }
      .splash-text-enter {
        animation: splashTextEnter 0.6s ease-out forwards;
      }
      .splash-text-exit {
        opacity: 0;
        transform: translateY(-8px);
        transition: opacity 0.3s ease-out, transform 0.3s ease-out;
      }
      @keyframes splashTextEnter {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .splash-progress {
        animation: splashProgress 2s ease-in-out forwards;
      }
      @keyframes splashProgress {
        0% { width: 0%; }
        70% { width: 85%; }
        100% { width: 100%; }
      }
      .splash-skip-hint {
        animation: splashSkipHint 0.5s ease-out 1.2s forwards;
      }
      @keyframes splashSkipHint {
        to { opacity: 0.6; }
      }
    </style>
  </head>
  <body class="text-slate-900 h-screen overflow-hidden">
    <div id="root" class="h-full min-h-screen flex items-center justify-center bg-slate-50">
      <p class="text-slate-500 font-medium">Loading…</p>
    </div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
